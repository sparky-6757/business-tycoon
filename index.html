<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#070b14" />
    <meta name="description" content="HelixBridge Business Tycoon - a biotech/pharma services business simulation game." />
    <title>HelixBridge Business Tycoon</title>
    <style>
      .helix-feedback-link {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 2147483647;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 13px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.28);
        background: rgba(15, 23, 42, 0.88);
        color: #e5e7eb;
        font: 800 13px/1.1 -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Arial, sans-serif;
        text-decoration: none;
        box-shadow: 0 16px 42px rgba(0, 0, 0, 0.34);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      .helix-feedback-link:hover {
        border-color: rgba(96, 165, 250, 0.48);
        background: rgba(30, 41, 59, 0.94);
      }

      @media (max-width: 760px) {
        .helix-feedback-link {
          right: 12px;
          bottom: calc(82px + env(safe-area-inset-bottom));
          padding: 9px 11px;
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <a
      class="helix-feedback-link"
      href="https://github.com/sparky-6757/business-tycoon/issues/new?title=HelixBridge%20feedback%20or%20bug%20report"
      target="_blank"
      rel="noreferrer"
      aria-label="Report bug or send feedback"
    >
      🐞 Feedback
    </a>

    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
